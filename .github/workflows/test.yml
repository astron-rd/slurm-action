name: Run SLURM jobs
on:
  push:
jobs:
  test-default:
    name: Run with default settings
    runs-on: [slurm]
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          commands: |
            echo "Hostname: $(hostname)"
            nvidia-smi || true
  test-a4000:
    name: Run on NVIDIA A4000
    runs-on: [slurm]
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          partition: defq
          gres: gpu:A4000
          time: 00:01:00
          commands: |
            echo "Hostname: $(hostname)"
            nvidia-smi
  test-gpus:
    name: Run on various GPUs
    runs-on: [slurm]
    strategy:
      matrix:
        gpu:
          - {type: A4000, partition: defq}
          - {type: AD4000, partition: rbq}
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          partition: ${{ matrix.gpu.partition }}
          gres: gpu:${{ matrix.gpu.type }}
          time: 00:01:00
          commands: |
            echo "Hostname: $(hostname)"
            nvidia-smi
